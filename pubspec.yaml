name: agriculture_game
description: A realistic agriculture farming game with multiple farm tasks, levels, and single-player gameplay.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  flutter_animate: ^4.0.0
  liquid_progress_indicator: ^0.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
